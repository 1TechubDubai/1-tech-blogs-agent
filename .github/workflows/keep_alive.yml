name: Render Instance Keep-Alive

on:
  schedule:
    # Runs every 14 minutes, 24/7
    - cron: '*/14 * * * *'
  # Allows you to manually trigger it from the GitHub Actions tab to test it
  workflow_dispatch: 

jobs:
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render Web Service
        run: |
          echo "Pinging your Render Instance to prevent spin-down..."
          curl -s -o /dev/null -w "%{http_code}" https://one-tech-blogs-agent.onrender.com/docs
          echo -e "\nPing sent successfully!"